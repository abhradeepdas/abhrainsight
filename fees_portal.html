<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fees Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {background: linear-gradient(135deg, #f5f7fa, #e4ecf7); }

.navbar-brand img{width:150px}.card{border-radius:15px;box-shadow:0 4px 12px rgba(0,0,0,.15)}.input-group-text{border-radius:10px 0 0 10px;font-weight:700}.input-group .form-control{border-radius:0 10px 10px 0}.form-control:focus{box-shadow:0 0 5px rgba(13,110,253,.5)}.loading{color:#0d6efd;font-weight:700}.status-paid{color:green}.status-due{color:red}.skeleton-card{border-radius:15px;padding:20px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1)}.skeleton{height:12px;background:linear-gradient(90deg,#eee,#ddd,#eee);background-size:200% 100%;animation:1.2s infinite shimmer;border-radius:5px;margin-bottom:10px}.skeleton.title{height:20px;width:60%}.skeleton.small{height:10px;width:40%}.skeleton.box{height:50px;width:100%}@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}.custom-rules{list-style:none;padding:0}.custom-rules li{display:flex;align-items:flex-start;margin-bottom:14px;line-height:1.7}.custom-rules li span{background:#3bc7fe;color:#fff;font-weight:700;border-radius:50%;min-width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;margin-right:12px;font-size:14px}.check-btn{background-color:#d1f3fc;color:#333;border:1px solid #9b9696;padding:10px 14px;border-radius:6px;font-weight:500;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.6)}.check-btn:hover{background-color:#e9e9e9}
    
</style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#"><img src="my_logo.png" alt="Logo"></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li class="nav-item">
          <span class="nav-link">Mentor: Abhradeep Das</span>
        </li>
        <li class="nav-item ms-lg-3">
          <a class="btn btn-sm btn-outline-primary" href="index.html" target="_blank">Home</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

    
    
    
    
    


<div class="container mt-5 text-center">

<h5>Student Fees Portal</h5>

<div class="row justify-content-center mt-4">
<div class="col-md-4">

<div class="input-group mb-3 shadow-sm">
    <span class="input-group-text">+91</span>
    <input type="text" id="phone" class="form-control" maxlength="10" placeholder="Phone Number">
</div>

<div class="form-floating mb-3">
    <input type="text" id="guardian" class="form-control" placeholder="Guardian ID">
    <label>Guardian ID</label>
</div>


  <button id="checkBtn" class="btn check-btn w-100 d-flex align-items-center justify-content-center gap-2" onclick="checkFees()">
   
    <span>Check Fees</span>
</button>
  
  
  
  
  

</div>
</div>

<div class="row justify-content-center mt-4">
<div class="col-md-6">
<div id="result"></div>
</div>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyl3VFMH0Sygu1mOkSErFkZdWzcVtc2-IsRdpLLLrcfOLoLbpMhgN9cL-e8-qwb657G/exec";

async function checkFees(){

let phoneInput=document.getElementById("phone").value.trim();
let guardian=document.getElementById("guardian").value.trim();
let resultDiv=document.getElementById("result");
let btn=document.getElementById("checkBtn");

if(!/^[0-9]{10}$/.test(phoneInput)){
resultDiv.innerHTML=`<div class="alert alert-warning">Enter valid 10-digit phone number</div>`;
return;
}
  

if(guardian===""){
resultDiv.innerHTML=`<div class="alert alert-warning">Enter Guardian ID</div>`;
return;
}

let phone="+91"+phoneInput;

let url=API_URL+"?phone="+encodeURIComponent(phone)+"&guardian="+encodeURIComponent(guardian);

btn.disabled=true;
resultDiv.innerHTML = `
<div class="skeleton-card">

    <div class="skeleton title"></div>
    <div class="skeleton small"></div>

    <hr>

    <div class="row">
        <div class="col-4"><div class="skeleton box"></div></div>
        <div class="col-4"><div class="skeleton box"></div></div>
        <div class="col-4"><div class="skeleton box"></div></div>
    </div>

    <hr>

    <div class="skeleton small"></div>
    <div class="skeleton small"></div>

</div>

`;

try{

let res=await fetch(url);
let student=await res.json();

if(!student.error){

let statusClass=student.status==="Paid"?"status-paid":"status-due";

resultDiv.innerHTML=`
<div class="card p-4 text-start">

<h4 class="text-center">${student.name}</h4>

<hr>

<p><b>Class:</b> ${student.class}</p>
<p><b>Course:</b> ${student.course}</p>

<hr>

<div class="row text-center">
<div class="col-4"><b>Total</b><br>₹${student.fee}</div>
<div class="col-4 text-success"><b>Paid</b><br>₹${student.paid}</div>
<div class="col-4 text-danger"><b>Due</b><br>₹${student.due}</div>
</div>

<hr>

<p class="${statusClass}"><b>Status:</b> ${student.status}</p>

<hr>





<p class="mb-1"><strong>💳 Payment Method</strong></p>

<!-- UPI + Copy -->
<div class="d-flex align-items-center justify-content-between border rounded p-2 mb-2">
    <span id="upiText" class="fw-bold">9735236265@ybl</span>
    <button class="btn btn-sm btn-outline-primary" onclick="copyUPI()">📋</button>
</div>

<small id="copyMsg" class="text-success" style="display:none;">Copied!</small>



<p class="mt-2 text-muted">
After payment, please inform via WhatsApp.
</p>

</div>

<!-- RULES SECTION -->
<div class="card p-4 mt-4 text-start">
<br>
    <h5 class="text-decoration-underline mb-3" >Fees Policy & Guidelines</h5>

<ul class="custom-rules">

    <li>
        <span>1</span>
        Parents/guardians are kindly requested to complete the monthly fee payment within 8 (eight) days from the beginning of each calendar month.
    </li>

    <li>
        <span>2</span>
        In case of admission after the 22nd day of any month, the fee will be applicable from the subsequent month.
    </li>

    <li>
        <span>3</span>
        If admission is taken from the 15th to 22nd day of a month, only 50% of the monthly fee shall be charged for that month.
    </li>

    <li>
        <span>4</span>
        If a student wishes to discontinue classes temporarily and rejoin after a gap (e.g., one month), it is mandatory to 
        inform and consult the teacher in advance with a valid reason.
    </li>

    <li>
        <span>5</span>
        Regular attendance is expected from every student throughout the session. The teacher remains committed to providing quality education, and students are encouraged to attend classes with discipline, punctuality, and consistency.
      
    </li>

   

</ul>
<hr>
<p class="text-center text-muted" style="font-size:12px;">&#169; AbhraInsight 2026</p>
   
</div>







`;

}else{
resultDiv.innerHTML=`<div class="alert alert-danger">Invalid Phone or Guardian ID</div>`;
}

}catch(e){
resultDiv.innerHTML=`<div class="alert alert-danger">Server error</div>`;
}

btn.disabled=false;
}

document.getElementById("phone").addEventListener("input",function(){
this.value=this.value.replace(/[^0-9]/g,'');
});

  
  
  function copyUPI() {
    const upi = document.getElementById("upiText").innerText;

    navigator.clipboard.writeText(upi).then(() => {
        const msg = document.getElementById("copyMsg");
        msg.style.display = "inline";

        setTimeout(() => {
            msg.style.display = "none";
        }, 2000);
    });
}
  

  
  
  
  
  
  
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
