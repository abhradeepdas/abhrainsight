<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbhraInsight - Fees Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #fff; }
        .navbar-brand img { width: 150px; }

        .card {
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .status-paid { color: green; font-weight: bold; }
        .status-due { color: red; font-weight: bold; }

        .loading {
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand"><img src="my_logo.png"></a>
        <span>Mentor: Abhradeep Das</span>
    </div>
</nav>

<div class="container mt-5 text-center">

    <h2>Student Fees Portal</h2>
    <p>Enter Phone Number and Guardian ID</p>

    <div class="row justify-content-center mt-4">
        <div class="col-md-4">

            <!-- +91 PREFIX -->
            <div class="input-group mb-2">
                <span class="input-group-text">+91</span>
                <input type="text" id="phone" class="form-control" maxlength="10" placeholder="Enter 10-digit number">
            </div>

            <input type="text" id="guardian" class="form-control mb-3" placeholder="Guardian ID">

            <button id="checkBtn" class="btn btn-primary w-100" onclick="checkFees()">Check Fees</button>
        </div>
    </div>

    <div class="row justify-content-center mt-4">
        <div class="col-md-6">
            <div id="result"></div>
        </div>
    </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyl3VFMH0Sygu1mOkSErFkZdWzcVtc2-IsRdpLLLrcfOLoLbpMhgN9cL-e8-qwb657G/exec";

async function checkFees() {

    let phoneInput = document.getElementById("phone").value.trim();
    let guardian = document.getElementById("guardian").value.trim();
    let resultDiv = document.getElementById("result");
    let btn = document.getElementById("checkBtn");

    // 🔒 Validation
    if (!/^[0-9]{10}$/.test(phoneInput)) {
        resultDiv.innerHTML = `<div class="alert alert-warning">Enter valid 10-digit phone number</div>`;
        return;
    }

    if (guardian === "") {
        resultDiv.innerHTML = `<div class="alert alert-warning">Enter Guardian ID</div>`;
        return;
    }

    let phone = "+91" + phoneInput;

    let url = API_URL + "?phone=" + encodeURIComponent(phone) + "&guardian=" + encodeURIComponent(guardian);

    // 🔄 Loading state
    btn.disabled = true;
    resultDiv.innerHTML = `<div class="loading text-center">Checking...</div>`;

    try {

        let response = await fetch(url);

        if (!response.ok) throw new Error("Network error");

        let student = await response.json();

        if (!student.error) {

            let statusClass = student.status === "Paid" ? "status-paid" : "status-due";

            resultDiv.innerHTML = `
            <div class="card p-4 text-start">
                <h5 class="mb-3">${student.name}</h5>

                <p><strong>Class:</strong> ${student.class}</p>
                <p><strong>Course:</strong> ${student.course}</p>

                <hr>

                <p><strong>Monthly Fee:</strong> ₹${student.fee}</p>
                <p><strong>Paid:</strong> ₹${student.paid}</p>
                <p><strong>Due:</strong> ₹${student.due}</p>

                <p class="${statusClass} mt-2">Status: ${student.status}</p>

                <hr>

                <p><strong>Payment Method:</strong></p>
                <p>UPI: <b>yourname@upi</b></p>
            </div>
            `;

        } else {
            resultDiv.innerHTML = `<div class="alert alert-danger">Invalid Phone Number or Guardian ID</div>`;
        }

    } catch (error) {
        console.error(error);
        resultDiv.innerHTML = `<div class="alert alert-danger">Server error. Try again later.</div>`;
    }

    btn.disabled = false;
}

// 🔒 Only allow numbers in phone input
document.getElementById("phone").addEventListener("input", function() {
    this.value = this.value.replace(/[^0-9]/g, '');
});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
